  Assess permission scope, minimize sensitive capabilities,
  and surface security risks that should be attached after main domain routing.
inputs:
  - permission_declarations
  - manifest_fragments
  - bounded_context
depends_on: []
validators:
  - validator-core-output
artifacts:
  - permissions-review.md
exit_criteria:
  - permission_scope_reviewed
  - minimization_plan_ready
